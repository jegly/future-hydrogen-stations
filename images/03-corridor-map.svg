<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a7ab5"/>
      <stop offset="100%" stop-color="#1a5a8a"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a9e4e"/>
      <stop offset="100%" stop-color="#4a8e3e"/>
    </linearGradient>
    <linearGradient id="urban" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8a7a"/>
      <stop offset="100%" stop-color="#6a6a5a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowH2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4aa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#e8f0f8" rx="8"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Newcastle–Sydney Hydrogen Corridor</text>
  <text x="500" y="55" text-anchor="middle" font-size="13" fill="#4a5a6a">Phase 2 — 500 MW Offshore Wind | 188 km H₂ Pipeline | 45,000 t/yr</text>

  <!-- Ocean area (right side) -->
  <rect x="650" y="80" width="320" height="580" fill="url(#ocean)" rx="5"/>
  <text x="810" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0e0ff">🌊 Pacific Ocean</text>

  <!-- Land area (left and centre) -->
  <rect x="30" y="80" width="620" height="580" fill="url(#land)" rx="5"/>

  <!-- Urban areas -->
  <!-- Newcastle -->
  <ellipse cx="180" cy="220" rx="45" ry="35" fill="url(#urban)" opacity="0.7"/>
  <text x="180" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Newcastle</text>

  <!-- Central Coast -->
  <ellipse cx="350" cy="380" rx="40" ry="30" fill="url(#urban)" opacity="0.6"/>
  <text x="350" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Central Coast</text>

  <!-- Sydney Metro -->
  <ellipse cx="480" cy="550" rx="55" ry="40" fill="url(#urban)" opacity="0.7"/>
  <text x="480" y="548" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Sydney</text>

  <!-- Western Sydney -->
  <ellipse cx="380" cy="580" rx="35" ry="25" fill="url(#urban)" opacity="0.5"/>
  <text x="380" y="580" text-anchor="middle" font-size="10" fill="#fff">Western Sydney</text>

  <!-- Port Botany -->
  <ellipse cx="530" cy="620" rx="25" ry="20" fill="url(#urban)" opacity="0.5"/>
  <text x="530" y="622" text-anchor="middle" font-size="9" fill="#fff">Port Botany</text>

  <!-- Offshore wind farm zone -->
  <rect x="700" y="150" width="240" height="200" rx="10" fill="none" stroke="#7ab8f5" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="820" y="145" text-anchor="middle" font-size="11" fill="#a0d0ff">Offshore Wind Zone</text>
  <text x="820" y="160" text-anchor="middle" font-size="10" fill="#90c0f0">500 MW | 30–40 turbines</text>

  <!-- Wind turbine icons -->
  <g transform="translate(740, 200)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#a0c0e0" stroke-width="2"/>
    <polygon points="-15,0 0,-25 15,0" fill="#a0c0e0"/>
    <circle cx="0" cy="40" r="2" fill="#a0c0e0"/>
  </g>
  <g transform="translate(800, 240)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#a0c0e0" stroke-width="2"/>
    <polygon points="-15,0 0,-25 15,0" fill="#a0c0e0"/>
    <circle cx="0" cy="40" r="2" fill="#a0c0e0"/>
  </g>
  <g transform="translate(860, 200)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#a0c0e0" stroke-width="2"/>
    <polygon points="-15,0 0,-25 15,0" fill="#a0c0e0"/>
    <circle cx="0" cy="40" r="2" fill="#a0c0e0"/>
  </g>
  <g transform="translate(740, 290)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#a0c0e0" stroke-width="2"/>
    <polygon points="-15,0 0,-25 15,0" fill="#a0c0e0"/>
    <circle cx="0" cy="40" r="2" fill="#a0c0e0"/>
  </g>
  <g transform="translate(800, 320)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#a0c0e0" stroke-width="2"/>
    <polygon points="-15,0 0,-25 15,0" fill="#a0c0e0"/>
    <circle cx="0" cy="40" r="2" fill="#a0c0e0"/>
  </g>
  <g transform="translate(860, 290)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#a0c0e0" stroke-width="2"/>
    <polygon points="-15,0 0,-25 15,0" fill="#a0c0e0"/>
    <circle cx="0" cy="40" r="2" fill="#a0c0e0"/>
  </g>

  <!-- Floating solar -->
  <rect x="720" y="380" width="100" height="40" rx="5" fill="#f5a623" opacity="0.6"/>
  <text x="770" y="403" text-anchor="middle" font-size="10" fill="#fff">☀️ 100 MW</text>
  <text x="770" y="415" text-anchor="middle" font-size="9" fill="#fff">Floating Solar</text>

  <!-- Coastal Electrolysis Facility -->
  <rect x="120" y="140" width="80" height="50" rx="8" fill="#1a1a2e" stroke="#00d4aa" stroke-width="2" filter="url(#glow)"/>
  <text x="160" y="162" text-anchor="middle" font-size="10" font-weight="bold" fill="#00d4aa">⚡ Coastal</text>
  <text x="160" y="176" text-anchor="middle" font-size="10" font-weight="bold" fill="#00d4aa">Facility</text>
  <text x="160" y="188" text-anchor="middle" font-size="8" fill="#90e0d0">300 MW</text>

  <!-- Subsea cable -->
  <line x1="200" y1="165" x2="700" y2="250" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="#ff6b6b">Subsea HVDC Cable</text>

  <!-- Pipeline route -->
  <path d="M 160 190 L 160 220 L 200 260 L 300 340 L 380 440 L 420 520 L 480 560" 
        stroke="#00d4aa" stroke-width="4" fill="none" marker-end="url(#arrowH2)" filter="url(#glow)"/>
  <path d="M 160 190 L 160 220 L 200 260 L 300 340 L 380 440 L 420 520 L 480 560" 
        stroke="#00f5d4" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Pipeline label -->
  <text x="280" y="295" text-anchor="middle" font-size="10" fill="#00d4aa" font-weight="bold" transform="rotate(-30, 280, 295)">H₂ Pipeline (188 km)</text>

  <!-- Distribution Hubs -->
  <!-- Hub 1: Kooragang -->
  <rect x="180" y="240" width="50" height="30" rx="5" fill="#8b4513" stroke="#ffd700" stroke-width="1.5"/>
  <text x="205" y="253" text-anchor="middle" font-size="8" fill="#ffd700" font-weight="bold">Kooragang</text>
  <text x="205" y="264" text-anchor="middle" font-size="7" fill="#ffe0a0">Hub 1</text>

  <!-- Hub 2: Central Coast -->
  <rect x="310" y="340" width="50" height="30" rx="5" fill="#8b4513" stroke="#ffd700" stroke-width="1.5"/>
  <text x="335" y="353" text-anchor="middle" font-size="8" fill="#ffd700" font-weight="bold">Somersby</text>
  <text x="335" y="364" text-anchor="middle" font-size="7" fill="#ffe0a0">Hub 2</text>

  <!-- Hub 3: Western Sydney -->
  <rect x="400" y="540" width="55" height="30" rx="5" fill="#8b4513" stroke="#ffd700" stroke-width="1.5"/>
  <text x="427" y="553" text-anchor="middle" font-size="8" fill="#ffd700" font-weight="bold">Eastern Crk</text>
  <text x="427" y="564" text-anchor="middle" font-size="7" fill="#ffe0a0">Hub 3</text>

  <!-- Hub 4: Port Botany -->
  <rect x="505" y="600" width="50" height="30" rx="5" fill="#8b4513" stroke="#ffd700" stroke-width="1.5"/>
  <text x="530" y="613" text-anchor="middle" font-size="8" fill="#ffd700" font-weight="bold">Botany</text>
  <text x="530" y="624" text-anchor="middle" font-size="7" fill="#ffe0a0">Hub 4</text>

  <!-- Fueling station icons -->
  <g transform="translate(230, 270)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#2c3e50"/>
    <text x="0" y="3" text-anchor="middle" font-size="8" fill="#00d4aa">⛽</text>
  </g>
  <g transform="translate(360, 410)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#2c3e50"/>
    <text x="0" y="3" text-anchor="middle" font-size="8" fill="#00d4aa">⛽</text>
  </g>
  <g transform="translate(460, 580)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#2c3e50"/>
    <text x="0" y="3" text-anchor="middle" font-size="8" fill="#00d4aa">⛽</text>
  </g>

  <!-- M1 Motorway label -->
  <path d="M 160 250 L 250 320 L 350 400 L 450 530 L 490 570" stroke="#888" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="310" y="420" font-size="9" fill="#666" transform="rotate(-40, 310, 420)">M1 Motorway</text>

  <!-- Legend -->
  <rect x="30" y="610" width="550" height="70" rx="8" fill="#fff" opacity="0.85" stroke="#ccc" stroke-width="1"/>
  <text x="50" y="630" font-size="11" font-weight="bold" fill="#1a1a2e">Legend:</text>

  <line x1="50" y1="650" x2="90" y2="650" stroke="#00d4aa" stroke-width="3"/>
  <text x="95" y="654" font-size="10" fill="#333">H₂ Pipeline</text>

  <line x1="200" y1="650" x2="240" y2="650" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="245" y="654" font-size="10" fill="#333">Subsea Cable</text>

  <rect x="350" y="642" width="16" height="16" rx="3" fill="#8b4513" stroke="#ffd700" stroke-width="1"/>
  <text x="372" y="654" font-size="10" fill="#333">Distribution Hub</text>

  <rect x="470" y="642" width="16" height="16" rx="3" fill="#2c3e50"/>
  <text x="490" y="647" text-anchor="middle" font-size="8" fill="#00d4aa">⛽</text>
  <text x="510" y="654" font-size="10" fill="#333">Fueling Station</text>

  <!-- Scale bar -->
  <line x1="600" y1="650" x2="700" y2="650" stroke="#333" stroke-width="2"/>
  <line x1="600" y1="645" x2="600" y2="655" stroke="#333" stroke-width="2"/>
  <line x1="700" y1="645" x2="700" y2="655" stroke="#333" stroke-width="2"/>
  <text x="650" y="645" text-anchor="middle" font-size="9" fill="#333">50 km</text>

</svg>