<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a5a"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e59612"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00c49a"/>
    </linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#3a80c9"/>
    </linearGradient>
    <linearGradient id="step5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b4513"/>
      <stop offset="100%" stop-color="#7b3503"/>
    </linearGradient>
    <linearGradient id="step6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b8e23"/>
      <stop offset="100%" stop-color="#5b7e13"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowCycle" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#f0f4f8" rx="8"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">♻️ Hydrogen Barrel — Circular Economy Lifecycle</text>
  <text x="500" y="55" text-anchor="middle" font-size="12" fill="#4a5a6a">Closed-Loop System — From Post-Consumer Waste to Fuel Transport and Back</text>

  <!-- Circular flow path (background) -->
  <circle cx="500" cy="370" r="280" fill="none" stroke="#4a90d9" stroke-width="2" stroke-dasharray="10,5" opacity="0.3"/>

  <!-- ===== STEP 1: WASTE COLLECTION ===== -->
  <g transform="translate(130, 120)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="url(#step1)" filter="url(#shadow)"/>
    <text x="0" y="-30" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">① WASTE</text>
    <text x="0" y="-12" text-anchor="middle" font-size="11" fill="#ffe0e0">Post-Consumer</text>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#ffe0e0">Collection</text>
    <text x="0" y="25" text-anchor="middle" font-size="9" fill="#ffc0c0">HDPE bottles</text>
    <text x="0" y="38" text-anchor="middle" font-size="9" fill="#ffc0c0">Aluminium cans</text>
    <!-- Icon -->
    <text x="0" y="-52" text-anchor="middle" font-size="20">🗑️</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 210 170 Q 280 170 300 220" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowCycle)"/>

  <!-- ===== STEP 2: MATERIAL PROCESSING ===== -->
  <g transform="translate(370, 200)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="url(#step2)" filter="url(#shadow)"/>
    <text x="0" y="-30" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">② PROCESS</text>
    <text x="0" y="-12" text-anchor="middle" font-size="11" fill="#fff8e0">Sort, Shred,</text>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#fff8e0">Wash, Pelletise</text>
    <text x="0" y="25" text-anchor="middle" font-size="9" fill="#ffe0b0">Aluminium → Melt</text>
    <text x="0" y="38" text-anchor="middle" font-size="9" fill="#ffe0b0">HDPE → Pellets</text>
    <!-- Icon -->
    <text x="0" y="-52" text-anchor="middle" font-size="20">⚙️</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M 410 300 Q 430 350 500 350" stroke="#f5a623" stroke-width="2.5" fill="none" marker-end="url(#arrowCycle)"/>

  <!-- ===== STEP 3: MANUFACTURE ===== -->
  <g transform="translate(500, 320)">
    <rect x="-85" y="-55" width="170" height="110" rx="12" fill="url(#step3)" filter="url(#shadow)"/>
    <text x="0" y="-35" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">③ MANUFACTURE</text>
    <text x="0" y="-17" text-anchor="middle" font-size="11" fill="#e0fff0">Injection Mould</text>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#e0fff0">rHDPE Shell</text>
    <text x="0" y="17" text-anchor="middle" font-size="11" fill="#e0fff0">+ Al Liner</text>
    <text x="0" y="35" text-anchor="middle" font-size="9" fill="#c0ffe0">Assemble barrel</text>
    <text x="0" y="48" text-anchor="middle" font-size="9" fill="#c0ffe0">Test &amp; certify</text>
    <!-- Icon -->
    <text x="0" y="-57" text-anchor="middle" font-size="20">🏭</text>
  </g>

  <!-- Arrow 3→4 -->
  <path d="M 570 420 Q 620 460 650 480" stroke="#00d4aa" stroke-width="2.5" fill="none" marker-end="url(#arrowCycle)"/>

  <!-- ===== STEP 4: FILL ===== -->
  <g transform="translate(730, 440)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="url(#step4)" filter="url(#shadow)"/>
    <text x="0" y="-30" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">④ FILL</text>
    <text x="0" y="-12" text-anchor="middle" font-size="11" fill="#e0f0ff">At Distribution</text>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#e0f0ff">Hub</text>
    <text x="0" y="25" text-anchor="middle" font-size="9" fill="#c0e0ff">Green H₂</text>
    <text x="0" y="38" text-anchor="middle" font-size="9" fill="#c0e0ff">350–500 bar</text>
    <!-- Icon -->
    <text x="0" y="-52" text-anchor="middle" font-size="20">⛽</text>
  </g>

  <!-- Arrow 4→5 -->
  <path d="M 730 540 Q 700 600 600 620" stroke="#4a90d9" stroke-width="2.5" fill="none" marker-end="url(#arrowCycle)"/>

  <!-- ===== STEP 5: TRANSPORT &amp; DISPENSE ===== -->
  <g transform="translate(500, 580)">
    <rect x="-85" y="-55" width="170" height="110" rx="12" fill="url(#step5)" filter="url(#shadow)"/>
    <text x="0" y="-35" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffd700">⑤ TRANSPORT</text>
    <text x="0" y="-17" text-anchor="middle" font-size="11" fill="#ffe0a0">&amp; DISPENSE</text>
    <text x="0" y="5" text-anchor="middle" font-size="9" fill="#ffd080">Truck delivery</text>
    <text x="0" y="20" text-anchor="middle" font-size="9" fill="#ffd080">to fueling stations</text>
    <text x="0" y="35" text-anchor="middle" font-size="9" fill="#ffd080">Dispense to vehicles</text>
    <!-- Icon -->
    <text x="0" y="-57" text-anchor="middle" font-size="20">🚛</text>
  </g>

  <!-- Arrow 5→6 -->
  <path d="M 430 630 Q 360 620 300 580" stroke="#8b4513" stroke-width="2.5" fill="none" marker-end="url(#arrowCycle)"/>

  <!-- ===== STEP 6: RETURN &amp; RECYCLE ===== -->
  <g transform="translate(180, 540)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="url(#step6)" filter="url(#shadow)"/>
    <text x="0" y="-30" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0f0c0">⑥ RETURN</text>
    <text x="0" y="-12" text-anchor="middle" font-size="11" fill="#e0f0b0">Empty Barrel</text>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#e0f0b0">Return to Hub</text>
    <text x="0" y="25" text-anchor="middle" font-size="9" fill="#d0e0a0">Inspect / Recertify</text>
    <text x="0" y="38" text-anchor="middle" font-size="9" fill="#d0e0a0">Refill or Recycle</text>
    <!-- Icon -->
    <text x="0" y="-52" text-anchor="middle" font-size="20">♻️</text>
  </g>

  <!-- Return arrow to Step 1 (recycle path) -->
  <path d="M 130 540 Q 80 480 80 400 Q 80 200 130 120" stroke="#6b8e23" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowCycle)"/>

  <!-- Return arrow to Step 3 (refill path - majority) -->
  <path d="M 260 540 Q 280 450 350 400 Q 400 370 415 375" stroke="#00d4aa" stroke-width="3" fill="none" marker-end="url(#arrowCycle)"/>
  <rect x="290" y="450" width="100" height="20" rx="5" fill="#00d4aa" opacity="0.15"/>
  <text x="340" y="464" text-anchor="middle" font-size="9" fill="#00d4aa" font-weight="bold">REFILL (80%)</text>

  <!-- Centre text -->
  <text x="500" y="680" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Circular Economy — Zero Virgin Material Required</text>

  <!-- Key metric -->
  <rect x="300" y="100" width="400" height="35" rx="8" fill="#1a1a2e" opacity="0.05"/>
  <text x="500" y="122" text-anchor="middle" font-size="11" fill="#4a5a6a">Barrel Fleet: 750 units | 15-year design life | 3 recertification cycles | End-of-life → remanufactured</text>

</svg>