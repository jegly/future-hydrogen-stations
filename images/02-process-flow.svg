<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fb5"/>
      <stop offset="100%" stop-color="#0d3b66"/>
    </linearGradient>
    <linearGradient id="wind" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#7ab8f5"/>
    </linearGradient>
    <linearGradient id="solar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="h2grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00f5d4"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4aa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5a623"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#f0f4f8" rx="8"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Hydrogen Highway — Seawater to Fuel Process Flow</text>

  <!-- ===== ROW 1: ENERGY INPUTS ===== -->

  <!-- Offshore Wind -->
  <rect x="50" y="60" width="160" height="70" rx="10" fill="url(#wind)" filter="url(#shadow)"/>
  <text x="130" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">🌬️ Offshore Wind</text>
  <text x="130" y="108" text-anchor="middle" font-size="11" fill="#e0f0ff">500 MW</text>
  <text x="130" y="122" text-anchor="middle" font-size="10" fill="#cce0ff">Capacity factor 48–52%</text>

  <!-- Floating Solar -->
  <rect x="250" y="60" width="160" height="70" rx="10" fill="url(#solar)" filter="url(#shadow)"/>
  <text x="330" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">☀️ Floating Solar</text>
  <text x="330" y="108" text-anchor="middle" font-size="11" fill="#fff8e0">100 MW</text>
  <text x="330" y="122" text-anchor="middle" font-size="10" fill="#fff0c0">Complementary generation</text>

  <!-- Wave Energy -->
  <rect x="450" y="60" width="160" height="70" rx="10" fill="#5b8fb9" filter="url(#shadow)"/>
  <text x="530" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">🌊 Wave Energy</text>
  <text x="530" y="108" text-anchor="middle" font-size="11" fill="#d0e8ff">Optional augmentation</text>
  <text x="530" y="122" text-anchor="middle" font-size="10" fill="#c0ddf0">Ram pump intake</text>

  <!-- Arrow: Energy to Electrolysis -->
  <line x1="210" y1="95" x2="640" y2="170" stroke="#4a90d9" stroke-width="2.5" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>
  <line x1="410" y1="95" x2="640" y2="170" stroke="#f5a623" stroke-width="2.5" marker-end="url(#arrowOrange)" stroke-dasharray="6,3"/>
  <line x1="610" y1="95" x2="640" y2="170" stroke="#5b8fb9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== ROW 2: SEAWATER INTAKE ===== -->

  <!-- Ocean icon -->
  <rect x="50" y="175" width="560" height="55" rx="10" fill="url(#ocean)" filter="url(#shadow)"/>
  <text x="330" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">🌊 Seawater Intake — Ram Pumps (Wave-Powered)</text>
  <text x="330" y="218" text-anchor="middle" font-size="11" fill="#b0d8ff">Multiple intakes | &lt;0.15 m/s velocity | Fish-friendly screens</text>

  <!-- Arrow down to filtration -->
  <line x1="330" y1="230" x2="330" y2="275" stroke="#1a6fb5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Filtration -->
  <rect x="130" y="280" width="400" height="55" rx="10" fill="#e8f4f8" stroke="#1a6fb5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="303" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d3b66">Multi-Stage Filtration</text>
  <text x="330" y="320" text-anchor="middle" font-size="11" fill="#2a5a8a">Bar screens → Drum filters → Ultrafiltration → Partial RO</text>

  <!-- Arrow to electrolysis -->
  <line x1="330" y1="335" x2="330" y2="380" stroke="#1a6fb5" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== ROW 3: ELECTROLYSIS ===== -->

  <!-- Electrolysis -->
  <rect x="50" y="385" width="560" height="65" rx="10" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="330" y="410" text-anchor="middle" font-size="14" font-weight="bold" fill="#00d4aa">⚡ Electrolysis — Green Hydrogen Production</text>
  <text x="330" y="428" text-anchor="middle" font-size="11" fill="#90e0d0">300 MW Hybrid (PEM + Alkaline) | 45,000 tonnes H₂/year | 65% efficiency</text>
  <text x="330" y="443" text-anchor="middle" font-size="10" fill="#70c0b0">Co-products: Oxygen (360,000 t/yr) + Brine minerals (NaOH, Mg, Li)</text>

  <!-- ===== CONNECTING ARROWS TO RIGHT SIDE ===== -->

  <!-- Arrow to compression -->
  <line x1="610" y1="417" x2="700" y2="417" stroke="#00d4aa" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Compression -->
  <rect x="710" y="385" width="160" height="65" rx="10" fill="#2d5a3d" filter="url(#shadow)"/>
  <text x="790" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#90ee90">🗜️ Compression</text>
  <text x="790" y="428" text-anchor="middle" font-size="11" fill="#b0f0b0">30 bar → 70–100 bar</text>
  <text x="790" y="443" text-anchor="middle" font-size="10" fill="#90e090">Multi-stage reciprocating</text>

  <!-- Arrow to pipeline -->
  <line x1="870" y1="417" x2="960" y2="417" stroke="#00d4aa" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Pipeline -->
  <rect x="970" y="385" width="160" height="65" rx="10" fill="#4a4a6a" filter="url(#shadow)"/>
  <text x="1050" y="410" text-anchor="middle" font-size="13" font-weight="bold" fill="#d0d0ff">🛢️ H₂ Pipeline</text>
  <text x="1050" y="428" text-anchor="middle" font-size="11" fill="#c0c0f0">FRP / coated steel</text>
  <text x="1050" y="443" text-anchor="middle" font-size="10" fill="#b0b0e0">188 km trunk line</text>

  <!-- Branch arrow down from pipeline to distribution -->
  <line x1="1050" y1="450" x2="1050" y2="470" stroke="#00d4aa" stroke-width="2.5"/>
  <line x1="1050" y1="470" x2="790" y2="470" stroke="#00d4aa" stroke-width="2.5"/>
  <line x1="790" y1="470" x2="790" y2="500" stroke="#00d4aa" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Distribution Hub label -->
  <text x="920" y="465" text-anchor="middle" font-size="10" fill="#2a5a8a" font-style="italic">Distribution Hub</text>

  <!-- ===== BOTTOM: END USE ===== -->

  <!-- Fueling Station -->
  <rect x="50" y="510" width="260" height="55" rx="10" fill="#8b4513" filter="url(#shadow)"/>
  <text x="180" y="535" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffd700">⛽ Fueling Station</text>
  <text x="180" y="552" text-anchor="middle" font-size="11" fill="#ffe0a0">350 bar / 700 bar dispensing</text>

  <!-- Barrel Transport -->
  <rect x="360" y="510" width="260" height="55" rx="10" fill="#6b8e23" filter="url(#shadow)"/>
  <text x="490" y="535" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0f0c0">♻️ Barrel Transport</text>
  <text x="490" y="552" text-anchor="middle" font-size="11" fill="#e0f0b0">rHDPE + recycled Al liners</text>

  <!-- Vehicles -->
  <rect x="670" y="510" width="260" height="55" rx="10" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="800" y="535" text-anchor="middle" font-size="13" font-weight="bold" fill="#00d4aa">🚛 End Use — Zero Emission</text>
  <text x="800" y="552" text-anchor="middle" font-size="11" fill="#90e0d0">Trucks | Buses | Vans | Industry</text>

  <!-- Arrows to end use -->
  <line x1="310" y1="470" x2="180" y2="510" stroke="#00d4aa" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="490" y1="470" x2="490" y2="510" stroke="#00d4aa" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="800" y1="470" x2="800" y2="510" stroke="#00d4aa" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- CO2 avoidance callout -->
  <rect x="960" y="510" width="200" height="55" rx="10" fill="#1a5c2a" filter="url(#shadow)"/>
  <text x="1060" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#90ee90">🌱 CO₂ Avoided</text>
  <text x="1060" y="552" text-anchor="middle" font-size="11" fill="#b0f0b0">350,000 tonnes/year</text>

  <!-- Water return arrow (circular economy) -->
  <path d="M 130 417 Q 20 417 20 350 Q 20 280 50 280" stroke="#4a90d9" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowBlue)"/>
  <text x="12" y="360" font-size="9" fill="#4a90d9" transform="rotate(-90, 12, 360)">Brine valorisation</text>

</svg>